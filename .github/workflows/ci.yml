name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile workflow helper
        run: python -B -m py_compile scripts/github/agent_workflow.py

      - name: Run unit tests
        run: python -B -m unittest tests.unit.github.test_agent_workflow
